version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rooftop-garden-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped
    networks:
      - rooftop-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rooftop-garden-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - rooftop-network

networks:
  rooftop-network:
    driver: bridge
